[workspace]
authors = ["jpsch <jpsch@dtu.dk>"]
channels = ["conda-forge"]
name = "spo-pywake-dataset"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.12.*"
numba = ">=0.62.1,<0.63"
numpy = ">=2.3.5,<3"
pandas = ">=2.3.3,<3"
matplotlib = ">=3.10.8,<4"
pytorch = ">=2.8.0,<3"
tqdm = ">=4.67.1,<5"
ipykernel = ">=7.1.0,<8"
jupyter = ">=1.1.1,<2"


[pypi-dependencies]
py-wake = ">=2.6.14, <3"
torch-geometric = ">=2.7.0, <3"

[feature.dev.dependencies]
# Code quality and formatting tools (all by Astral)
ruff = ">=0.8.0,<0.9"
pre-commit = ">=4.0.0,<5"

[feature.dev.pypi-dependencies]
# ty - Astral's fast type checker (replaces mypy)
ty = ">=0.0.8"

[feature.dev.tasks]
# Code formatting (ruff format replaces black + isort)
format = "ruff format ."
format-check = "ruff format --check ."

# Linting (ruff check includes isort rules)
lint = "ruff check ."
lint-fix = "ruff check --fix ."

# Type checking (ty replaces mypy)
typecheck = "ty check ."

# Run all quality checks
quality = { depends-on = ["format-check", "lint", "typecheck"] }

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
